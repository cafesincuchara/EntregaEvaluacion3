name: Deploy ProductosAPI

on:
  push:
    branches: [ "main", "develop", "brayan_test" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: productosapi
  ECR_REGISTRY: 767398076646.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_v2 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_v2 }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_v2 }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_v2 }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_v2 }}
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            docker stop productosapi || true
            docker rm productosapi || true
            docker run -d -p 8080:8080 \
              --name productosapi \
              --log-driver awslogs \
              --log-opt awslogs-group=/productosapi/microservice \
              --log-opt awslogs-region=${{ env.AWS_REGION }} \
              -e SERVER_PORT=8080 \
              -e AWS_REGION=${{ env.AWS_REGION }} \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            docker system prune -f